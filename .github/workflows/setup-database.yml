name: setup-database

# Manually-dispatched utility: applies EF Core migrations to the Neon database
# and (optionally) upserts DATABASE_URL into the Vercel project's env vars.
# Secrets are passed as dispatch inputs because this runs on demand against
# infrastructure the CI has no stored credentials for; both values are masked
# from logs immediately.
on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'Neon DATABASE_URL (postgres://user:pass@host/db)'
        required: true
        type: string
      vercel_token:
        description: 'Vercel API token — if set, upserts DATABASE_URL into the Vercel project'
        required: false
        type: string
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_N6nBzD6pyniUOQnXjEwZvZai4LSF
      VERCEL_TEAM_ID: team_RIdC9jHGccsozzQUMSvEfIQX
    steps:
      - name: Mask inputs
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          VERCEL_TOKEN: ${{ inputs.vercel_token }}
        run: |
          echo "::add-mask::$DATABASE_URL"
          if [ -n "$VERCEL_TOKEN" ]; then echo "::add-mask::$VERCEL_TOKEN"; fi

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Apply EF Core migrations to Neon
        working-directory: backend
        env:
          DATABASE_URL: ${{ inputs.database_url }}
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project ComeRico.Core --startup-project ComeRico.Api
          echo "Migraciones aplicadas:"
          dotnet ef migrations list --project ComeRico.Core --startup-project ComeRico.Api --no-build

      - name: Upsert DATABASE_URL into Vercel project env
        if: ${{ inputs.vercel_token != '' }}
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          VERCEL_TOKEN: ${{ inputs.vercel_token }}
        run: |
          body=$(jq -n --arg v "$DATABASE_URL" \
            '[{key:"DATABASE_URL", value:$v, type:"encrypted", target:["production","preview","development"]}]')
          status=$(curl -sS -o /tmp/vercel-env.json -w '%{http_code}' \
            -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID&upsert=true" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$body")
          echo "Vercel API status: $status"
          # Show the response without leaking the env value
          jq 'del(.created[]?.value)' /tmp/vercel-env.json || cat /tmp/vercel-env.json
          [ "$status" -ge 200 ] && [ "$status" -lt 300 ]
