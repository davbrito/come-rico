name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-restore --configuration Release

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ./frontend/package.json
          cache: true
          cache-dependency-path: ./frontend/pnpm-lock.yaml

      - uses: actions/setup-node@v6
        with:
          node-version-file: ./frontend/.node-version
          cache: pnpm
          cache-dependency-path: ./frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile && pnpm openapi-ts

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit -p .

      # Vitest currently fails to boot in this repo (Nitro/TanStack Start
      # plugins aren't compatible with its dev server) and there are no
      # test files yet — re-enable once that's fixed.
      # - name: Test
      #   run: pnpm test

      # - name: Build
      #   run: pnpm build
